<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon-64.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="description" content="BiteSites builds custom Voice AI receptionists that answer calls, qualify leads, book appointments, and follow up 24/7. Talk with our AI agent demo." />
    <meta name="robots" content="index,follow,max-image-preview:large" />
    <link rel="canonical" href="https://bitesites.org/" />
    <!-- The share card is deliberately not the <title> above. That title is
         doing SEO work for "voice ai receptionist" and should keep doing it,
         but it is a narrow and robotic thing to hand someone in a text message
         — and it undersells a studio that also ships sites, automations, and
         custom AI. og:* is a separate surface, so it gets the brand line.
         og:image is absolute because iMessage and Slack will not resolve a
         relative one. Regenerate the image with `npm run og`; the -vN in the
         filename is the cache-buster and must match the file in public/. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="BiteSites" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:title" content="BiteSites — Intelligence built into your business." />
    <meta property="og:description" content="Voice AI receptionists, web development, AI automation, and custom AI projects — built end to end for businesses that want to answer faster and capture more leads." />
    <meta property="og:url" content="https://bitesites.org/" />
    <meta property="og:image" content="https://bitesites.org/og-cover-v1.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="BiteSites — Intelligence built into your business. Voice AI receptionists, web development, AI automation, social media, and custom AI." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BiteSites — Intelligence built into your business." />
    <meta name="twitter:description" content="Voice AI receptionists, web development, AI automation, and custom AI projects — built end to end for businesses that want to answer faster and capture more leads." />
    <meta name="twitter:image" content="https://bitesites.org/og-cover-v1.jpg" />
    <title>Voice AI Receptionists & AI Phone Agents | BiteSites</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Loaded as a preload and promoted to a stylesheet on arrival, so a
         round trip to a third-party origin is not on the critical rendering
         path. `display=swap` already means text paints in the fallback first,
         so this changes when the page renders, not how it ends up looking. -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Tomorrow:wght@400;500;600;700;800&display=swap"
      onload="this.rel='stylesheet'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Tomorrow:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    </noscript>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://bitesites.org/#organization",
            "name": "BiteSites",
            "url": "https://bitesites.org/"
          },
          {
            "@type": "Service",
            "@id": "https://bitesites.org/#voice-ai-receptionist",
            "name": "Custom Voice AI Receptionist",
            "serviceType": "Voice AI agent development and automation",
            "provider": { "@id": "https://bitesites.org/#organization" },
            "description": "Custom AI phone agents that answer inbound calls, qualify leads, book appointments, follow up, and connect with business CRM workflows.",
            "url": "https://bitesites.org/#ai-receptionist",
            "areaServed": "US"
          },
          {
            "@type": "FAQPage",
            "mainEntity": [
              {
                "@type": "Question",
                "name": "What can a Voice AI receptionist do?",
                "acceptedAnswer": { "@type": "Answer", "text": "A Voice AI receptionist can answer inbound calls, respond to common questions, qualify leads, book appointments, route callers, and update connected CRM workflows." }
              },
              {
                "@type": "Question",
                "name": "Can an AI phone agent work with my calendar and CRM?",
                "acceptedAnswer": { "@type": "Answer", "text": "Yes. BiteSites can connect a custom AI phone agent with business calendars, qualification rules, and CRM follow-up workflows." }
              },
              {
                "@type": "Question",
                "name": "Is the Voice AI agent trained for my business?",
                "acceptedAnswer": { "@type": "Answer", "text": "Yes. Each agent can be trained on your services, common questions, lead qualification criteria, appointment process, and human escalation rules." }
              }
            ]
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
